# omnidash/docker-compose.posthog.yml
# Phase 2: Self-hosted PostHog co-located with omnidash.
# Usage: docker compose -f docker-compose.yml -f docker-compose.posthog.yml up -d
#
# NOTE: This file is a placeholder for Phase 2. PostHog requires ClickHouse,
# Redis, and Kafka — the full docker-compose from PostHog's repo is ~20 services.
# For Phase 2, we'll pull from PostHog's official compose and adapt.
# See: https://posthog.com/docs/self-host/deploy/docker

services:
  omnidash:
    environment:
      - VITE_POSTHOG_API_HOST=http://posthog:8000

