# topics.yaml — Contract-first topic manifest for ReadModelConsumer (OMN-5028)
#
# This file is the single source of truth for topics that the ReadModelConsumer
# subscribes to. Each entry corresponds to a topic that has a projection handler
# in read-model-consumer.ts.
#
# Rules:
#   - Only add topics that have a corresponding handler in the ReadModelConsumer
#   - Topic names must be canonical ONEX format (onex.<kind>.<producer>.<event-name>.v<N>)
#   - Keep entries sorted by producer, then by event-name
#   - When adding a new projection, add the topic here AND wire the handler
#
# Used by: server/services/topic-manifest-loader.ts
# Consumed by: server/read-model-consumer.ts (will replace READ_MODEL_TOPICS in OMN-5029)

version: "1"

read_model_topics:
