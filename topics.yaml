#   - Keep entries sorted by producer, then by event-name
#
# OMN-7810: Migrated from non-canonical underscore-prefixed names to canonical
# ONEX topic names. These now match the provisioned topics in omnibase_infra
# platform_topic_suffixes.py and services/topics.yaml.
monitored_topics:
