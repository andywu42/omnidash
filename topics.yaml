# topics.yaml — Single source of truth for ReadModelConsumer topic subscriptions
#
# OMN-5028: Created as contract-first manifest.
# OMN-5251: Replaced READ_MODEL_TOPICS as sole topic source (no fallback).
#
# READ_MODEL_TOPICS in read-model-consumer.ts is populated from this file at
# module load time. If this file is missing or invalid, the process exits.
#
# Rules:
#   - Only add topics that have a corresponding handler in the ReadModelConsumer
#   - Topic names must be canonical ONEX format (onex.<kind>.<producer>.<event-name>.v<N>)
#   - Keep entries sorted by producer, then by event-name
#   - When adding a new projection, add the topic here AND wire the handler
#
# Used by: server/services/topic-manifest-loader.ts
# Consumed by: server/read-model-consumer.ts (READ_MODEL_TOPICS)

