name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  # Architectural invariant: omnidash must never query upstream databases directly.
  # All intelligence data must flow through Kafka into omnidash_analytics.
  # This job runs with no dependencies (pure grep) for a fast ~10s signal.
  arch-guard:
    name: Arch Guard (no upstream DB access)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: No direct upstream PostgreSQL port (5436)
        run: |
          # Port 5436 is the external port for the upstream PostgreSQL instance.
          # omnidash should never open a connection to it directly.
          # Exclude comment lines (// and * and JSDoc) and markdown files to
          # prevent false positives on documentation references (F7/OMN-6477).
          # grep -rn output is "file:line:content" — comment filters must
          # match content after the second colon, not the full line (F7/OMN-6640).
          VIOLATIONS=$(grep -rn ":5436" \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.git \
            --exclude-dir=coverage \
            . \
            | grep -v ':[0-9]*:\s*//' \
            | grep -v ':[0-9]*:\s*\*' \
            | grep -v ':[0-9]*:\s*/\*' \
            | grep -v '\.md:' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Architectural violation: direct connection to upstream PostgreSQL port 5436 detected in non-comment code."
            echo "omnidash connects only to omnidash_analytics via OMNIDASH_ANALYTICS_DB_URL."
            echo ""
            echo "Violations found:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: No hardcoded :5436 upstream DB port"

      - name: No unsafe sql.raw() usage (OMN-5196)
        run: |
          # sql.raw() is banned outside of sql-safety.ts and test helpers.
          # All SQL interpolation must go through safeInterval() / safeTruncUnit()
          # from server/sql-safety.ts to prevent injection risks.
          #
          # Allowed exceptions:
          #   - server/sql-safety.ts (centralized safe wrappers that use sql.raw internally)
          #   - server/__tests__/ (test helpers with explicit regex guards)
          #   - Comments (lines starting with // or * or --)
          VIOLATIONS=$(grep -rn 'sql\.raw(' \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.git \
            --exclude-dir=coverage \
            --exclude-dir=__tests__ \
            server/ \
            | grep -v 'server/sql-safety\.ts' \
            | grep -v '^\s*//' \
            | grep -v '^\s*\*' \
            | grep -v '^\s*--' \
            | grep -v '// .*sql\.raw' \
            | grep -v '\* .*sql\.raw' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Security violation: unsafe sql.raw() usage detected outside sql-safety.ts."
            echo "All SQL interpolation must use safeInterval() / safeTruncUnit() from server/sql-safety.ts."
            echo "See OMN-5196 for details."
            echo ""
            echo "Violations found:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: No unsafe sql.raw() usage outside sql-safety.ts"

      - name: No deprecated omniarchon references
        run: |
          VIOLATIONS=$(grep -rn "omniarchon" \
            --include="*.ts" --include="*.tsx" --include="*.json" \
            --exclude="no-omninode-bridge-refs.test.ts" \
            --exclude="package-lock.json" \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.git \
            --exclude-dir=coverage \
            . || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Architectural violation: omniarchon is a deprecated service and must not be referenced."
            echo ""
            echo "Violations found:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: No omniarchon references"

      - name: No unannotated empty responses (OMN-7769)
        run: bash scripts/lint-empty-responses.sh server

      - name: No forbidden stub markers (OMN-5606)
        run: |
          # Uses the same detector as the pre-commit hook (single source of truth)
          pip install pre-commit > /dev/null 2>&1
          pre-commit run check-ts-stubs --all-files || {
            echo "::error::Forbidden // stub: markers found. Use // stub-ok: or // intentional-skip: instead."
            exit 1
          }

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x, 22.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run check

      - name: Run unit tests
        run: npm run test:ci
        timeout-minutes: 10
        env:
          CI: true
          FORCE_COLOR: 0

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build

  # OMN-3749: Migration integration test.
  # Applies all SQL migrations against a fresh PostgreSQL, verifies idempotency
  # (double-apply), runs parity check, and asserts a reasonable table count.
  migration-integration:
    name: Migration Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: omnidash_analytics
        ports:
          - "5436:5432"
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply all migrations (first run)
        env:
          OMNIDASH_ANALYTICS_DB_URL: "postgresql://postgres:test_password@localhost:5436/omnidash_analytics"
        run: npm run db:migrate

      - name: Apply all migrations again (idempotency test)
        env:
          OMNIDASH_ANALYTICS_DB_URL: "postgresql://postgres:test_password@localhost:5436/omnidash_analytics"
        run: npm run db:migrate

      - name: Run parity check
        env:
          OMNIDASH_ANALYTICS_DB_URL: "postgresql://postgres:test_password@localhost:5436/omnidash_analytics"
        run: npx tsx scripts/check-migration-parity.ts

      - name: Assert expected table count
        run: |
          TABLE_COUNT=$(PGPASSWORD=test_password psql -h localhost -p 5436 -U postgres -d omnidash_analytics \
            -tc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'" \
            | tr -d ' ')
          echo "Public tables found: $TABLE_COUNT"
          # Expect at least 10 tables (migrations create many) but not wildly more than expected.
          # Range accommodates future growth. Adjust upper bound as migrations accumulate.
          if [ "$TABLE_COUNT" -lt 10 ] || [ "$TABLE_COUNT" -gt 90 ]; then
            echo "::error::Unexpected table count: $TABLE_COUNT (expected 10-90)"
            exit 1
          fi
          echo "OK: table count $TABLE_COUNT is within expected range"

  # OMN-3749: Projection-migration coupling gate.
  # Detects PRs that modify read-model-consumer.ts without a migration file.
  migration-coupling:
    name: Migration Coupling Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check projection-migration coupling
        run: npx tsx scripts/check-migration-required.ts --ci

  # OMN-5181: Smoke-test every dashboard route after a production build.
  # Catches SSR/render crashes, missing imports, and broken pages before merge.
  smoke-test:
    name: Route Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server and run smoke test
        run: |
          # Start production server in background (no Kafka/DB needed for route rendering)
          KAFKA_BROKERS= \
          KAFKA_BOOTSTRAP_SERVERS= \
          OMNIDASH_ANALYTICS_DB_URL= \
          ENABLE_REAL_TIME_EVENTS=false \
          SESSION_SECRET=ci-smoke-test-secret \
          PORT=3000 \
          NODE_ENV=production \
          node dist/index.js &
          SERVER_PID=$!

          # Wait for server to accept connections (up to 60s)
          for i in $(seq 1 60); do
            if curl -s -o /dev/null http://localhost:3000/; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "::error::Server failed to start within 60s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Run smoke test
          npm run test:smoke
          RESULT=$?

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          exit $RESULT
        timeout-minutes: 5

  # OMN-5638: Playwright smoke tests — catches page crashes, broken imports,
  # and render regressions that the HTTP-only smoke test cannot detect.
  # Runs a real Chromium browser against every dashboard route.
  playwright-smoke:
    name: Playwright Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e:smoke
        timeout-minutes: 5
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7

  # OMN-6432: Drizzle-to-migration schema parity gate.
  # Validates that every pgTable() in Drizzle schema files has a matching
  # CREATE TABLE in the SQL migrations directory.
  schema-parity:
    name: Drizzle-Migration Schema Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run db:check-drizzle-parity

  # OMN-6433: Event schema parity (advisory only).
  # Validates TypeScript event types match Pydantic schema exports.
  # continue-on-error: input pipeline (Pydantic schema export) not yet reliable.
  event-schema-parity:
    name: Event Schema Parity (TypeScript vs Pydantic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Export Pydantic schemas
        run: |
          pip install omnibase_core omnibase_infra omniclaude omniintelligence 2>/dev/null || echo "Schema export requires Python packages - skipping live validation"
      - name: Validate schema parity
        continue-on-error: true
        run: |
          if [ -f /tmp/event-schemas.json ]; then
            npx tsx scripts/validate-schema-parity.ts --schemas /tmp/event-schemas.json
          else
            echo "Skipping: no event schemas available (requires Python packages)"
          fi

  # OMN-7004: Playwright P0 data verification — runs against seeded PostgreSQL
  # to verify the DB-to-API-to-UI chain renders real data. This catches the
  # "61 empty tables" regression where routes return 200 but show no data.
  # Does NOT need Kafka — uses seed scripts to populate data directly.
  playwright-data-verification:
    name: Playwright P0 Data Verification
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: omnidash_analytics
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/omnidash_analytics

      - name: Seed test data
        run: |
          npx tsx scripts/seed-demo-patterns.ts
          npx tsx scripts/seed-effectiveness.ts
          # seed-intent-events.ts requires Kafka — skipped in CI (DB-only seeding)
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/omnidash_analytics

      - name: Build omnidash
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/omnidash_analytics

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start omnidash and run P0 data tests
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test --config playwright.dataflow.config.ts p0-data-verification.spec.ts
        timeout-minutes: 5
        env:
          CI: true
          PORT: 3000
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/omnidash_analytics
          KAFKA_BOOTSTRAP_SERVERS: ''
          NODE_ENV: production
          SESSION_SECRET: ci-test-secret-not-for-production

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-data-report
          path: playwright-report-dataflow/
          retention-days: 7

  # Aggregator job: branch protection requires this single check name
  # instead of individual matrix entries (which change when versions update).
  tests-gate:
    name: CI Tests Gate
    runs-on: ubuntu-latest
    needs: [test, arch-guard, migration-integration, smoke-test, playwright-smoke, playwright-data-verification, schema-parity, contract-compliance]
    if: always()
    steps:
      - name: Check test results
        env:
          TEST_RESULT: ${{ needs.test.result }}
          ARCH_RESULT: ${{ needs.arch-guard.result }}
          MIGRATION_RESULT: ${{ needs.migration-integration.result }}
          SMOKE_RESULT: ${{ needs.smoke-test.result }}
          PLAYWRIGHT_RESULT: ${{ needs.playwright-smoke.result }}
          PLAYWRIGHT_DATA_RESULT: ${{ needs.playwright-data-verification.result }}
          SCHEMA_PARITY_RESULT: ${{ needs.schema-parity.result }}
        run: |
          FAILED=0
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::One or more test matrix jobs failed or were cancelled"
            echo "Test matrix result: $TEST_RESULT"
            FAILED=1
          fi
          if [ "$ARCH_RESULT" != "success" ]; then
            echo "::error::Architectural guard failed -- omnidash must not access upstream databases directly"
            echo "Arch guard result: $ARCH_RESULT"
            FAILED=1
          fi
          if [ "$MIGRATION_RESULT" != "success" ]; then
            echo "::error::Migration integration test failed"
            echo "Migration result: $MIGRATION_RESULT"
            FAILED=1
          fi
          if [ "$SMOKE_RESULT" != "success" ]; then
            echo "::error::Route smoke test failed -- one or more dashboard pages returned non-2xx"
            echo "Smoke test result: $SMOKE_RESULT"
            FAILED=1
          fi
          if [ "$PLAYWRIGHT_RESULT" != "success" ]; then
            echo "::error::Playwright smoke test failed -- one or more dashboard pages crashed or had JS errors"
            echo "Playwright result: $PLAYWRIGHT_RESULT"
            FAILED=1
          fi
          if [ "$PLAYWRIGHT_DATA_RESULT" != "success" ]; then
            echo "::error::Playwright P0 data verification failed -- dashboard pages not rendering real data [OMN-7004]"
            echo "Playwright data result: $PLAYWRIGHT_DATA_RESULT"
            FAILED=1
          fi
          if [ "$SCHEMA_PARITY_RESULT" != "success" ]; then
            echo "::error::Drizzle-migration schema parity check failed"
            echo "Schema parity result: $SCHEMA_PARITY_RESULT"
            FAILED=1
          fi
          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "All checks passed (tests: $TEST_RESULT, arch-guard: $ARCH_RESULT, migration: $MIGRATION_RESULT, smoke: $SMOKE_RESULT, playwright: $PLAYWRIGHT_RESULT, playwright-data: $PLAYWRIGHT_DATA_RESULT, schema-parity: $SCHEMA_PARITY_RESULT)"

  # ============================================================================
  # MIGRATION COLLISION GATE (OMN-8623)
  # Detects duplicate numeric prefixes in migrations/ that cause non-deterministic
  # apply order and silent data loss.
  # NOTE: Gate must land AFTER the 5 existing duplicate-prefix collisions are fixed.
  # ============================================================================
  migration-collision:
    name: Migration Collision Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for duplicate migration prefixes
        run: python scripts/check_migration_collisions.py

  # ⚠️ Do not rename — branch protection requires this exact check name

  contract-compliance:
    name: Contract Compliance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Clone onex_change_control
        run: git clone --depth=1 https://github.com/OmniNode-ai/onex_change_control.git /tmp/onex_change_control
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Run contract compliance check
        run: |
          python /tmp/onex_change_control/scripts/ci/run_contract_compliance_check.py \
            --pr ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --contracts-dir /tmp/onex_change_control/contracts
        env:
          EMERGENCY_BYPASS: ${{ secrets.EMERGENCY_BYPASS || '' }}
          GH_TOKEN: ${{ github.token }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [tests-gate, migration-collision]
    if: always()
    steps:
      - name: Evaluate gates
        run: |
          echo "CI Tests Gate: ${{ needs.tests-gate.result }}"
          echo "Migration Collision: ${{ needs.migration-collision.result }}"
          FAILED=false
          if [[ "${{ needs.tests-gate.result }}" != "success" ]]; then
            echo "::error::CI Summary: tests-gate FAILED"
            FAILED=true
          fi
          if [[ "${{ needs.migration-collision.result }}" != "success" ]]; then
            echo "::error::CI Summary: migration-collision FAILED"
            FAILED=true
          fi
          if [[ "$FAILED" == "true" ]]; then
            echo "::error::CI Summary: FAILED"
            exit 1
          fi
          echo "CI Summary: PASSED"
