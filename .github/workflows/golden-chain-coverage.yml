# .github/workflows/golden-chain-coverage.yml
# Golden Chain Coverage Gate (OMN-7495)
#
# Runs golden projection tests in unit mode and verifies Tier 1 topic coverage.
# Always produces a `golden-chain` check status (required by branch protection).
# Skips the heavy test run when no projection-related files changed.
name: Golden Chain Coverage Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  golden-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for projection-related changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            'server/read-model-consumer.ts' \
            'server/consumers/read-model/**' \
            'migrations/**/*.sql' \
            'server/__tests__/golden-chain/**' \
            'topics.yaml' \
            'shared/intelligence-schema.ts' \
          )
          if [ -n "$CHANGED" ]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "Projection files changed — running golden chain tests"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "No projection files changed — skipping tests"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.run_tests == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
        if: steps.changes.outputs.run_tests == 'true'

      - name: Run golden projection tests (unit mode)
        if: steps.changes.outputs.run_tests == 'true'
        run: npx vitest run server/__tests__/golden-chain/ --reporter=verbose
        env:
          GOLDEN_MODE: unit

      - name: Verify projection coverage gate
        if: steps.changes.outputs.run_tests == 'true'
        run: npx vitest run server/__tests__/golden-chain/coverage-gate.test.ts --reporter=verbose
