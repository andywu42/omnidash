---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      # OMN-3777: Block cloud bus references in source code
      - id: no-cloud-bus
        name: Block cloud bus references
        entry: bash scripts/check_no_cloud_bus_wrapper.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: no-env-file
        name: Reject committed .env files (except .env.example)
        entry: >-
          bash -c 'FILES=$(git diff --cached --name-only | grep -E "(^|/)\.env([._-].+)?$" |
          grep -vE "\.env\.example"); [ -n "$FILES" ] &&
          { echo "BLOCKED: .env staged - use ~/.omnibase/.env instead. Run: git reset HEAD <file>"; exit 1; } ||
          true'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: no-planning-docs
        name: Block planning docs (belong in omni_home/docs/plans/)
        entry: >-
          bash -c 'PLAN_FILES=$(git diff --cached --name-only -- "docs/plans/");
          if [ -n "$PLAN_FILES" ]; then
          echo "ERROR: Planning docs must live in omni_home/docs/plans/, not in this repo:";
          echo "$PLAN_FILES";
          echo "";
          echo "Move your file to: /Volumes/PRO-G40/Code/omni_home/docs/plans/";
          exit 1;
          fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

default_stages: [pre-commit]
fail_fast: false
