---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: local
    hooks:
      # OMN-3777: Block cloud bus references in source code
      - id: no-cloud-bus
        name: Block cloud bus references
        entry: bash scripts/check_no_cloud_bus_wrapper.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: no-env-file
        name: Reject committed .env files (except .env.example)
        entry: >-
          bash -c 'FILES=$(git diff --cached --name-only | grep -E "(^|/)\.env([._-].+)?$" |
          grep -vE "\.env\.example"); [ -n "$FILES" ] &&
          { echo "BLOCKED: .env staged - use ~/.omnibase/.env instead. Run: git reset HEAD <file>"; exit 1; } ||
          true'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: no-planning-docs
        name: Block planning docs (belong in omni_home/docs/plans/)
        entry: >-
          bash -c 'PLAN_FILES=$(git diff --cached --name-only -- "docs/plans/");
          if [ -n "$PLAN_FILES" ]; then
          echo "ERROR: Planning docs must live in omni_home/docs/plans/, not in this repo:";
          echo "$PLAN_FILES";
          echo "";
          echo "Move your file to: /Volumes/PRO-G40/Code/omni_home/docs/plans/";
          exit 1;
          fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # --------------------------------------------------------------------------
      # SPDX Header Enforcement (OMN-4859, ONEX ecosystem parity)
      # Validates: All Python source files carry MIT SPDX headers
      # Scope: scripts/, tests/ (.py files only)
      # --------------------------------------------------------------------------
      - id: validate-spdx-headers
        name: ONEX SPDX Header Requirement
        entry: bash scripts/validate_spdx_headers.sh
        language: system
        pass_filenames: true
        files: ^(scripts|tests)/.*\.py$
        exclude: ^(archived/|archive/)
        stages: [pre-commit]

  - repo: https://github.com/OmniNode-ai/onex_change_control
    rev: 16659f5db9f03b7f248da5fc319647013be18682 # pragma: allowlist secret
    hooks:
      - id: check-ts-stubs
        stages: [pre-commit]
      - id: no-hardcoded-topics
        stages: [pre-commit]
        # Pre-existing violations — pending migration to canonical topic constants.
        # Justifications for each exclude:
        #   platform-projections.ts     — hardcoded topic in SQL template literal (1 violation)
        #   omniclaude-projections.ts   — hardcoded pattern-enforcement topic in projection switch (2 violations)
        #   event-consumer.ts           — hardcoded introspection cmd + skill topics (3 violations)
        #   topic-registry-service.ts   — startsWith('onex.evt.') prefix filter, not a topic literal (1 false positive)
        #   event-bus-demo.ts           — mock/demo data with sample topic strings (8+ violations)
        #   audit-components.py         — audit script with hardcoded expected topic references (4 violations)
        #   check-bus-parity.ts         — parity checker with expected topic list (3 violations)
        #   startup-backfill.ts         — backfill script with hardcoded topics
        #   event-bus-health-poller.ts  — health poller with hardcoded topics
        exclude: ^(server/consumers/read-model/(platform|omniclaude)-projections\.ts|server/event-consumer\.ts|server/services/topic-registry-service\.ts|server/startup-backfill\.ts|server/event-bus-health-poller\.ts|client/src/lib/mock-data/event-bus-demo\.ts|scripts/audit-components\.py|scripts/check-bus-parity\.ts)$
      - id: no-bare-feature-flags
        stages: [pre-commit]

default_stages: [pre-commit]
fail_fast: false
