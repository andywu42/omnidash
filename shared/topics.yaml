# shared/topics.yaml — Flow manifest for data_flow_sweep
#
# Enriches topics.yaml (root) with E2E metadata for each read-model topic:
#   - source:   producing repo/service
#   - consumer: projection handler function name
#   - table:    target omnidash_analytics DB table(s)
#
# Generated from topics.yaml + server/consumers/read-model/*.ts
# Used by: onex:data_flow_sweep skill (Phase 1 manifest build)

